<!DOCTYPE html>
<html>
<head>
  <title>Farmacias de turno</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #f2f2f2;
      --card: white;
      --text: black;
    }

    body.dark {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #ffffff;
    }

    body {
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 10px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h2 {
      font-size: 20px;
    }

    .toggle {
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      background: #444;
      color: white;
      font-size: 12px;
    }

    .card {
      background: var(--card);
      padding: 15px;
      margin: 12px 0;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      font-size: 16px;
    }

    .boton {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .llamar {
      background: #28a745;
    }

    .mapa {
      background: #007bff;
    }

    .turno {
      color: #00c853;
      font-weight: bold;
      display: block;
      margin-top: 5px;
    }

    .vacio {
      text-align: center;
      margin-top: 60px;
      font-size: 18px;
      color: gray;
    }

    @media (max-width: 600px) {
      h2 { font-size: 18px; }
      .card { font-size: 15px; }
      .boton { font-size: 15px; padding: 10px; }
    }
  </style>
</head>

<body>

<div class="topbar">
  <h2>💊 Farmacias de turno</h2>
  <div class="toggle" onclick="toggleDark()">🌙 / ☀️</div>
</div>

<div id="lista"></div>

<script>
// 🌙 MODO OSCURO
function toggleDark() {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("modo", "dark");
  } else {
    localStorage.setItem("modo", "light");
  }
}

// cargar preferencia
if (localStorage.getItem("modo") === "dark") {
  document.body.classList.add("dark");
}

// 📡 DATOS
fetch("TU_URL_DE_APPS_SCRIPT")
  .then(res => res.json())
  .then(data => {

    let contenedor = document.getElementById("lista");
    contenedor.innerHTML = "";

    let hoy = new Date();
    let dia = String(hoy.getDate()).padStart(2, '0');
    let mes = String(hoy.getMonth() + 1).padStart(2, '0');
    let fechaHoy = dia + "/" + mes;

    let hayResultados = false;

    data.forEach(f => {

      if (
        f.turno &&
        f.turno.toUpperCase() === "SI" &&
        f.fecha === fechaHoy
      ) {

        hayResultados = true;

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <b>${f.nombre}</b><br>
          📍 ${f.direccion}<br>
          📞 ${f.telefono}<br>
          <span class="turno">🟢 DE TURNO (${f.horario})</span>

          <a class="boton llamar" href="tel:${f.telefono}">
            📲 Llamar
          </a>

          <a class="boton mapa" 
             href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(f.direccion)}" 
             target="_blank">
            📍 Cómo llegar
          </a>
        `;

        contenedor.appendChild(div);
      }
    });

    if (!hayResultados) {
      contenedor.innerHTML = `
        <div class="vacio">
          ❌ No hay farmacias de turno hoy
        </div>
      `;
    }

  })
  .catch(err => {
    document.getElementById("lista").innerHTML = `
      <div class="vacio">
        ⚠️ Error al cargar datos
      </div>
    `;
  });
</script>

</body>
</html>
