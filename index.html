<!DOCTYPE html>
<html>
<head>
  <title>Farmacias de turno</title>
</head>
<body>

<h2>Farmacias de turno</h2>

<ul id="lista"></ul>

<script>
fetch("https://script.google.com/macros/s/AKfycbymd8bLia1pKLJT-4Qmu2N7zez8KR_F6-TMo_nqdnwW_OFL5WzYoyBmbAT9zWCT0yFraw/exec")
  .then(res => res.json())
  .then(data => {
    let lista = document.getElementById("lista");

    data.forEach(f => {
      if (f.turno === "SI") {
        let li = document.createElement("li");

        li.innerHTML = `
          <b>${f.nombre}</b><br>
          ${f.direccion}<br>
          📞 ${f.telefono}<br>
          🟢 DE TURNO (${f.horario})
          <hr>
        `;

        lista.appendChild(li);
      }
    });
  });
</script>

</body>
</html>
