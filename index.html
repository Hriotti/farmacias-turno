<!DOCTYPE html>
<html>
<head>
  <title>Farmacias de turno</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --bg: #f2f2f2;
      --card: white;
      --text: black;
    }

    body.dark {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #ffffff;
    }

    body {
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 10px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggle {
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      background: #444;
      color: white;
    }

    .card {
      background: var(--card);
      padding: 15px;
      margin: 12px 0;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .boton {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .llamar { background: #28a745; }
    .mapa { background: #007bff; }

    .turno {
      color: #00c853;
      font-weight: bold;
    }

    .vacio {
      text-align: center;
      margin-top: 50px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h2>💊 Farmacias de turno</h2>
  <div class="toggle" onclick="toggleDark()">🌙 / ☀️</div>
</div>

<button id="btnInstalar" style="display:none;">📲 Instalar app</button>

<div id="lista"></div>

<script>
let deferredPrompt;
let userLat = null;
let userLng = null;

// 🌙 modo oscuro
function toggleDark() {
  document.body.classList.toggle("dark");
  localStorage.setItem("modo", document.body.classList.contains("dark") ? "dark" : "light");
}

if (localStorage.getItem("modo") === "dark") {
  document.body.classList.add("dark");
}

// 📲 instalar app
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("btnInstalar").style.display = "block";
});

document.getElementById("btnInstalar").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  }
});

// 📍 ubicación
navigator.geolocation.getCurrentPosition(pos => {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  cargarDatos();
}, () => cargarDatos());

// 📏 distancia
function distancia(lat1, lon1, lat2, lon2) {
  let R = 6371;
  let dLat = (lat2-lat1) * Math.PI/180;
  let dLon = (lon2-lon1) * Math.PI/180;
  let a = Math.sin(dLat/2)**2 +
          Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
          Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 📅 normalizar fecha
function normalizarFecha(fecha) {
  let partes = fecha.split("/");
  if (partes.length === 3) {
    return partes[0].padStart(2,'0') + "/" +
           partes[1].padStart(2,'0') + "/" +
           partes[2];
  }
  return fecha;
}

// 📡 cargar datos
function cargarDatos() {
  fetch("https://script.google.com/macros/s/AKfycbymd8bLia1pKLJT-4Qmu2N7zez8KR_F6-TMo_nqdnwW_OFL5WzYoyBmbAT9zWCT0yFraw/exec")
    .then(res => res.json())
    .then(data => {

      let contenedor = document.getElementById("lista");
      contenedor.innerHTML = "";

      let hoy = new Date();
      let fechaHoy =
        String(hoy.getDate()).padStart(2,'0') + "/" +
        String(hoy.getMonth()+1).padStart(2,'0') + "/" +
        hoy.getFullYear();

      let farmacias = data.filter(f => {
        if (!f.fecha) return false;

        let fecha = normalizarFecha(f.fecha.toString());

        return (
          f.turno &&
          f.turno.toString().toUpperCase() === "SI" &&
          fecha === fechaHoy
        );
      });

      // ordenar por cercanía
      if (userLat && userLng) {
        farmacias = farmacias.filter(f => f.lat && f.lng);

        farmacias.sort((a,b) =>
          distancia(userLat,userLng,a.lat,a.lng) -
          distancia(userLat,userLng,b.lat,b.lng)
        );
      }

      if (farmacias.length === 0) {
        contenedor.innerHTML = `<div class="vacio">❌ No hay farmacias de turno hoy</div>`;
        return;
      }

      farmacias.forEach(f => {

        let d = (userLat && f.lat) ?
          `📏 ${distancia(userLat,userLng,f.lat,f.lng).toFixed(2)} km<br>` : "";

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <b>${f.nombre}</b><br>
          📍 ${f.direccion}<br>
          ${d}
          📞 ${f.telefono}<br>
          <span class="turno">🟢 DE TURNO (${f.horario})</span>

          <a class="boton llamar" href="tel:${f.telefono}">📲 Llamar</a>
          <a class="boton mapa"
             href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(f.direccion)}"
             target="_blank">📍 Cómo llegar</a>
        `;

        contenedor.appendChild(div);
      });

    })
    .catch(() => {
      document.getElementById("lista").innerHTML =
        `<div class="vacio">⚠️ Error al cargar datos</div>`;
    });
}

// 🔔 notificaciones
Notification.requestPermission();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
