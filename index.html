<!DOCTYPE html>
<html>
<head>
  <title>Farmacias de turno</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      margin: 0;
      padding: 10px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    .filtros {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
    }

    select, input, button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      font-weight: bold;
    }

    .instalar {
      background: #28a745;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
    }

    .boton {
      display: block;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }

    .llamar { background: green; }
    .mapa { background: blue; }

    .vacio {
      text-align: center;
      margin-top: 20px;
      color: gray;
    }

    @media (min-width: 600px) {
      .filtros {
        flex-direction: row;
      }
    }
  </style>
</head>

<body>

<div class="container">

<h2>💊 Farmacias de turno</h2>

<button id="btnInstalar" class="instalar" style="display:none;">
📲 Instalar app
</button>

<div class="filtros">
  <select id="localidad">
    <option value="">Todas</option>
    <option>La Plata</option>
    <option>Mar del Plata</option>
    <option>Quilmes</option>
    <option>Lanús</option>
  </select>

  <input type="text" id="cp" placeholder="Código postal">

  <button onclick="cargarDatos()">Buscar</button>
</div>

<div id="lista"></div>

</div>

<script>
// 📲 PWA instalar
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("btnInstalar").style.display = "block";
});

document.getElementById("btnInstalar").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
  }
});

// 📡 datos
function cargarDatos() {

  let loc = document.getElementById("localidad").value.toLowerCase();
  let cp = document.getElementById("cp").value;

  fetch("https://script.google.com/macros/s/AKfycbymd8bLia1pKLJT-4Qmu2N7zez8KR_F6-TMo_nqdnwW_OFL5WzYoyBmbAT9zWCT0yFraw/exec")
    .then(res => res.json())
    .then(data => {

      let contenedor = document.getElementById("lista");
      contenedor.innerHTML = "";

      let hoy = new Date();
      let fechaHoy =
        String(hoy.getDate()).padStart(2,'0') + "/" +
        String(hoy.getMonth()+1).padStart(2,'0') + "/" +
        hoy.getFullYear();

      let resultados = data.filter(f => {

        let okLoc = !loc || (f.localidad && f.localidad.toLowerCase() === loc);
        let okCP = !cp || (f.cp && f.cp.toString() === cp);

        return (
          f.turno &&
          f.turno.toString().toUpperCase() === "SI" &&
          f.fecha === fechaHoy &&
          okLoc &&
          okCP
        );
      });

      if (resultados.length === 0) {
        contenedor.innerHTML = `<div class="vacio">❌ No hay resultados</div>`;
        return;
      }

      resultados.forEach(f => {

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <b>${f.nombre}</b><br>
          📍 ${f.direccion} (${f.localidad})<br>
          📞 ${f.telefono}<br>
          🟢 DE TURNO (${f.horario})

          <a class="boton llamar" href="tel:${f.telefono}">
            📲 Llamar
          </a>

          <a class="boton mapa"
             href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(f.direccion)}"
             target="_blank">
            📍 Cómo llegar
          </a>
        `;

        contenedor.appendChild(div);
      });

    });
}
</script>

<script>
// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
